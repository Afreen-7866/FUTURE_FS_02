<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadFlow CRM</title>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --card:     #21253a;
      --border:   #2e3250;
      --accent:   #6c63ff;
      --accent2:  #00d2ff;
      --text:     #e8eaf6;
      --muted:    #7b82a8;
      --new:      #6c63ff;
      --contacted:#f59e0b;
      --qualified:#3b82f6;
      --converted:#10b981;
      --lost:     #ef4444;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,0.4);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.4rem; font-weight: 700; background: linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .topbar-right { display:flex; gap:.75rem; }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent)33; }
    .stat-label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-card[data-filter="all"]       .stat-value { color: var(--accent2); }
    .stat-card[data-filter="new"]       .stat-value { color: var(--new); }
    .stat-card[data-filter="contacted"] .stat-value { color: var(--contacted); }
    .stat-card[data-filter="qualified"] .stat-value { color: var(--qualified); }
    .stat-card[data-filter="converted"] .stat-value { color: var(--converted); }
    .stat-card[data-filter="lost"]      .stat-value { color: var(--lost); }

    /* ── TOOLBAR ── */
    .toolbar { display:flex; gap:.75rem; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap input {
      width:100%; padding:.6rem 1rem .6rem 2.5rem;
      background: var(--card); border:1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size:.9rem; outline:none; transition:border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); color:var(--muted); }
    select, .btn {
      padding:.6rem 1rem; border-radius:8px; border:1px solid var(--border);
      background: var(--card); color: var(--text); font-size:.9rem; cursor:pointer; outline:none;
    }
    select:focus { border-color:var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color:#fff; font-weight:600; transition:opacity .15s; }
    .btn-primary:hover { opacity:.85; }
    .btn-sm { padding:.35rem .75rem; font-size:.8rem; }
    .btn-danger { background: var(--lost); border-color: var(--lost); color:#fff; }
    .btn-success { background: var(--converted); border-color: var(--converted); color:#fff; }

    /* ── TABLE ── */
    .table-wrap { background: var(--card); border:1px solid var(--border); border-radius: var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead { background: var(--surface); }
    th { padding:.85rem 1rem; text-align:left; font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    td { padding:.85rem 1rem; border-top:1px solid var(--border); font-size:.875rem; vertical-align:middle; }
    tr:hover td { background: rgba(108,99,255,.05); }
    .empty-row td { text-align:center; padding:3rem; color:var(--muted); }

    /* ── BADGES ── */
    .badge {
      display:inline-block; padding:.25rem .65rem; border-radius:999px;
      font-size:.72rem; font-weight:600; text-transform:capitalize;
    }
    .badge-new       { background:#6c63ff22; color:var(--new); }
    .badge-contacted { background:#f59e0b22; color:var(--contacted); }
    .badge-qualified { background:#3b82f622; color:var(--qualified); }
    .badge-converted { background:#10b98122; color:var(--converted); }
    .badge-lost      { background:#ef444422; color:var(--lost); }
    .badge-website   { background:#00d2ff22; color:var(--accent2); }
    .badge-referral  { background:#a78bfa22; color:#a78bfa; }
    .badge-social    { background:#f472b622; color:#f472b6; }
    .badge-other     { background:#94a3b822; color:#94a3b8; }

    /* ── MODAL ── */
    .overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
      z-index:200; align-items:center; justify-content:center;
    }
    .overlay.open { display:flex; }
    .modal {
      background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
      padding:2rem; width:min(540px,95vw); max-height:90vh; overflow-y:auto;
      box-shadow: var(--shadow); animation: slideUp .2s ease;
    }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
    .modal-title { font-size:1.15rem; font-weight:700; }
    .close-btn { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; line-height:1; }
    .close-btn:hover { color:var(--text); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-group { display:flex; flex-direction:column; gap:.4rem; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:.8rem; color:var(--muted); font-weight:500; }
    input[type=text], input[type=email], input[type=tel], textarea, .form-select {
      padding:.6rem .9rem; background: var(--card); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:.9rem; outline:none; transition:border-color .2s;
      width:100%;
    }
    input:focus, textarea:focus, .form-select:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:80px; font-family:inherit; }
    .modal-footer { display:flex; justify-content:flex-end; gap:.75rem; margin-top:1.5rem; }
    .error-msg { color:var(--lost); font-size:.8rem; margin-top:.5rem; display:none; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
      padding:.75rem 1.25rem; border-radius:10px; font-size:.875rem; font-weight:500;
      display:none; animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    #toast.success { background:var(--converted); color:#fff; }
    #toast.error   { background:var(--lost);      color:#fff; }

    /* ── ACTIONS COL ── */
    .actions { display:flex; gap:.5rem; }

    /* ── RESPONSIVE ── */
    @media(max-width:640px){
      .form-grid { grid-template-columns:1fr; }
      th:nth-child(n+4), td:nth-child(n+4) { display:none; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <span class="logo">⚡ LeadFlow CRM</span>
  <div class="topbar-right">
    <button class="btn btn-primary" onclick="openModal()">+ Add Lead</button>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card" data-filter="all" onclick="filterByStatus('all',this)">
      <div class="stat-label">Total Leads</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card" data-filter="new" onclick="filterByStatus('new',this)">
      <div class="stat-label">New</div>
      <div class="stat-value" id="stat-new">—</div>
    </div>
    <div class="stat-card" data-filter="contacted" onclick="filterByStatus('contacted',this)">
      <div class="stat-label">Contacted</div>
      <div class="stat-value" id="stat-contacted">—</div>
    </div>
    <div class="stat-card" data-filter="qualified" onclick="filterByStatus('qualified',this)">
      <div class="stat-label">Qualified</div>
      <div class="stat-value" id="stat-qualified">—</div>
    </div>
    <div class="stat-card" data-filter="converted" onclick="filterByStatus('converted',this)">
      <div class="stat-label">Converted</div>
      <div class="stat-value" id="stat-converted">—</div>
    </div>
    <div class="stat-card" data-filter="lost" onclick="filterByStatus('lost',this)">
      <div class="stat-label">Lost</div>
      <div class="stat-value" id="stat-lost">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search name, email, company…" oninput="fetchLeads()" />
    </div>
    <select id="sourceFilter" onchange="fetchLeads()">
      <option value="all">All Sources</option>
      <option value="website">Website</option>
      <option value="referral">Referral</option>
      <option value="social">Social</option>
      <option value="other">Other</option>
    </select>
    <select id="sortSelect" onchange="fetchLeads()">
      <option value="created_at">Newest First</option>
      <option value="name">Name A–Z</option>
      <option value="updated_at">Recently Updated</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Company</th>
          <th>Source</th>
          <th>Status</th>
          <th>Added</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leadsBody">
        <tr class="empty-row"><td colspan="8">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add New Lead</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="f-name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="f-email" placeholder="jane@example.com" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="f-phone" placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="f-company" placeholder="Acme Corp" />
      </div>
      <div class="form-group">
        <label>Source</label>
        <select class="form-select" id="f-source">
          <option value="website">Website</option>
          <option value="referral">Referral</option>
          <option value="social">Social Media</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-select" id="f-status">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option>
          <option value="converted">Converted</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Any additional info…"></textarea>
      </div>
    </div>
    <div class="error-msg" id="formError"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  let currentFilter = 'all';
  let editingId = null;

  // ── INIT ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    fetchStats();
    fetchLeads();
    document.querySelector('[data-filter="all"]').classList.add('active');
  });

  // ── STATS ─────────────────────────────────────────────────────────────────
  async function fetchStats() {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('stat-total').textContent     = s.total;
    document.getElementById('stat-new').textContent       = s.new;
    document.getElementById('stat-contacted').textContent = s.contacted;
    document.getElementById('stat-qualified').textContent = s.qualified;
    document.getElementById('stat-converted').textContent = s.converted;
    document.getElementById('stat-lost').textContent      = s.lost;
  }

  // ── LEADS LIST ────────────────────────────────────────────────────────────
  async function fetchLeads() {
    const q      = document.getElementById('searchInput').value;
    const source = document.getElementById('sourceFilter').value;
    const sort   = document.getElementById('sortSelect').value;
    const params = new URLSearchParams({ status: currentFilter, source, q, sort });
    const r      = await fetch(`/api/leads?${params}`);
    const leads  = await r.json();
    renderTable(leads);
  }

  function renderTable(leads) {
    const tbody = document.getElementById('leadsBody');
    if (!leads.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No leads found</td></tr>';
      return;
    }
    tbody.innerHTML = leads.map(l => `
      <tr>
        <td><strong>${esc(l.name)}</strong></td>
        <td><a href="mailto:${esc(l.email)}" style="color:var(--accent2);text-decoration:none">${esc(l.email)}</a></td>
        <td>${esc(l.phone) || '<span style="color:var(--muted)">—</span>'}</td>
        <td>${esc(l.company) || '<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="badge badge-${l.source}">${l.source}</span></td>
        <td><span class="badge badge-${l.status}">${l.status}</span></td>
        <td style="color:var(--muted);font-size:.8rem">${fmtDate(l.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-sm" onclick="editLead(${l.id})">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteLead(${l.id},'${esc(l.name)}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── FILTER BY STATUS ──────────────────────────────────────────────────────
  function filterByStatus(status, el) {
    currentFilter = status;
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    fetchLeads();
  }

  // ── MODAL OPEN/CLOSE ──────────────────────────────────────────────────────
  function openModal(lead = null) {
    editingId = lead ? lead.id : null;
    document.getElementById('modalTitle').textContent = lead ? 'Edit Lead' : 'Add New Lead';
    document.getElementById('f-name').value    = lead?.name    || '';
    document.getElementById('f-email').value   = lead?.email   || '';
    document.getElementById('f-phone').value   = lead?.phone   || '';
    document.getElementById('f-company').value = lead?.company || '';
    document.getElementById('f-source').value  = lead?.source  || 'website';
    document.getElementById('f-status').value  = lead?.status  || 'new';
    document.getElementById('f-notes').value   = lead?.notes   || '';
    hideError();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  // ── SAVE (CREATE / UPDATE) ─────────────────────────────────────────────────
  async function saveLead() {
    const payload = {
      name:    document.getElementById('f-name').value.trim(),
      email:   document.getElementById('f-email').value.trim(),
      phone:   document.getElementById('f-phone').value.trim(),
      company: document.getElementById('f-company').value.trim(),
      source:  document.getElementById('f-source').value,
      status:  document.getElementById('f-status').value,
      notes:   document.getElementById('f-notes').value.trim(),
    };

    const url    = editingId ? `/api/leads/${editingId}` : '/api/leads';
    const method = editingId ? 'PUT' : 'POST';

    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();

    if (!r.ok) { showError(data.error || 'Something went wrong'); return; }

    closeModal();
    fetchLeads();
    fetchStats();
    toast(editingId ? 'Lead updated!' : 'Lead added!', 'success');
  }

  // ── EDIT ──────────────────────────────────────────────────────────────────
  async function editLead(id) {
    const r = await fetch(`/api/leads/${id}`);
    const lead = await r.json();
    openModal(lead);
  }

  // ── DELETE ────────────────────────────────────────────────────────────────
  async function deleteLead(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    const r = await fetch(`/api/leads/${id}`, { method: 'DELETE' });
    if (r.ok) {
      fetchLeads();
      fetchStats();
      toast('Lead deleted', 'success');
    } else {
      toast('Failed to delete', 'error');
    }
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(dt) {
    if (!dt) return '—';
    const d = new Date(dt + 'Z');
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function showError(msg) {
    const el = document.getElementById('formError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('formError').style.display = 'none';
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // close modal on Escape
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
